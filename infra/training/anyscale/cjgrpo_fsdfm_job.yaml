name: openbrowser-cjgrpo-fsdfm
entrypoint: bash -c "python -m infra.eval.scripts.download_datasets --datasets formfactory && python -m infra.training.flow_matching.cjgrpo_fsdfm_trainer"
containerfile: infra/training/anyscale/Containerfile.online-flow-grpo
compute_config:
  cloud: "Anyscale Cloud"
  head_node:
    instance_type: g5.xlarge
  worker_nodes: []
working_dir: .
excludes:
  - .git
  - .env
  - __pycache__
  - node_modules
  - frontend
  - .cursor
  - presentation
  - data/mind2web/
  - data/webarena/
  - results/
  - outputs/
  - openbrowser_agent_data/
  - data/formfactory/.git/
  - data/formfactory/img/
  - "*.pyc"
env_vars:
  FLOW_TRAIN_FILE: "data/processed/formfactory_sft.jsonl"
  MAX_TRAIN_SAMPLES: "50"
  NUM_EPOCHS: "1"
  FSDFM_SFT_CHECKPOINT: "/mnt/user_storage/openbrowser/checkpoints/fsdfm-sft"
  # CJ-GRPO hyperparameters
  GROUP_SIZE: "4"
  LR: "5e-5"
  KL_COEFF: "0.04"
  EPSILON: "0.2"
  MU: "1"
  NUM_SAMPLED_TIMESTEPS: "8"
  GEN_STEPS: "64"
  GEN_TEMP: "1.0"
  SHUFFLE: "true"
  MIN_NONZERO: "1"
  EARLY_STOP_MAX_STEPS: "40"
  CHECKPOINT_EVERY_STEPS: "10"
  GRAD_CLIP: "1.0"
  # HF_TOKEN injected from .env at submission time by submit_job.py
max_retries: 1
timeout_s: 14400
tags:
  project: openbrowser
  task: cjgrpo-fsdfm
  model: fsdfm-1.3b-dit
  method: cjgrpo-trajectory-consistency
