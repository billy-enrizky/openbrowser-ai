name: openbrowser-mdpo-refusion
entrypoint: bash -c "python -m infra.eval.scripts.download_datasets --datasets formfactory && python -m infra.training.flow_matching.mdpo_refusion_trainer"
containerfile: infra/training/anyscale/Containerfile.online-grpo
compute_config:
  cloud: "Anyscale Cloud"
  head_node:
    instance_type: g6e.xlarge
  worker_nodes: []
working_dir: .
excludes:
  - .git
  - .env
  - __pycache__
  - node_modules
  - frontend
  - .cursor
  - presentation
  - data/mind2web/
  - data/webarena/
  - results/
  - outputs/
  - openbrowser_agent_data/
  - data/formfactory/.git/
  - data/formfactory/img/
  - "*.pyc"
env_vars:
  FLOW_TRAIN_FILE: "data/processed/formfactory_sft.jsonl"
  MAX_TRAIN_SAMPLES: "50"
  NUM_EPOCHS: "1"
  FLOW_LLM_SFT_CHECKPOINT: "/mnt/user_storage/openbrowser/checkpoints/flow-llm-sft/adapter"
  # MDPO hyperparameters
  GROUP_SIZE: "4"
  LR: "1e-5"
  KL_COEFF: "0.04"
  EPSILON: "0.2"
  MU: "1"
  SAMPLE_TRAIN_STEPS: "8"
  WARMUP_STEPS: "5"
  CONFIDENCE_NOISE_STD: "0.1"
  GEN_STEPS: "64"
  GEN_TEMP: "1.0"
  SHUFFLE: "true"
  MIN_NONZERO: "1"
  EARLY_STOP_MAX_STEPS: "40"
  CHECKPOINT_EVERY_STEPS: "10"
  GRAD_CLIP: "1.0"
  # HF_TOKEN injected from .env at submission time by submit_job.py
max_retries: 1
timeout_s: 14400
tags:
  project: openbrowser
  task: mdpo-refusion
  model: refusion-8b-mdm
  method: mdpo-sequential-mdp
